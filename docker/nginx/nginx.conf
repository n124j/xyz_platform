# ──────────────────────────────────────────────────────────────
# XYZ Platform — Nginx Reverse Proxy Configuration
# Sits in front of Gunicorn (Django) and proxies WebSocket
# connections for Plotly Dash / Django Channels
# ──────────────────────────────────────────────────────────────

upstream django_app {
    server django:8000;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xyz.internal.com;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static files (served directly by Nginx) ───────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "private, max-age=604800";
    }

    # ── Login rate-limit ──────────────────────────────────────
    location /accounts/login/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://django_app;
        include /etc/nginx/proxy_params.conf;
    }

    # ── API rate-limit ────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://django_app;
        include /etc/nginx/proxy_params.conf;
    }

    # ── WebSocket (Plotly Dash / Channels) ───────────────────
    location /ws/ {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        include /etc/nginx/proxy_params.conf;
    }

    # ── Default Django proxy ──────────────────────────────────
    location / {
        proxy_pass http://django_app;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 120s;
    }

    # ── Health check endpoint ─────────────────────────────────
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
