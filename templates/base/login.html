<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign In | XYZ Investment Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/xyz.css' %}" />
  <style>
    body { background: #0a1628; display:flex; align-items:center; min-height:100vh; }
    .login-card { border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="login-card card text-white p-4 rounded-4 shadow-lg">
        <div class="text-center mb-4">
          <h5 class="fw-bold mb-0">XYZ Corp</h5>
          <small class="text-secondary">Investment Platform — Private Access</small>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label small">Username</label>
            <input type="text" name="username" class="form-control bg-dark text-white border-secondary"
                   autocomplete="username" required autofocus />
          </div>
          <div class="mb-4">
            <label class="form-label small">Password</label>
            <input type="password" name="password" class="form-control bg-dark text-white border-secondary"
                   autocomplete="current-password" required />
          </div>
          {% if form.errors %}
            <div class="alert alert-danger py-2 small">Invalid credentials. Please try again.</div>
          {% endif %}
          <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
        </form>
        <p class="text-center text-secondary small mt-3 mb-0">
          Contact <a href="mailto:it-support@xyz.com" class="text-secondary">IT Support</a> for access issues.
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
