# ──────────────────────────────────────────────────────────────
# XYZ Platform — Docker Compose (Development)
# Services: db, redis, django, celery-worker, celery-beat,
#           airflow-webserver, airflow-scheduler
# ──────────────────────────────────────────────────────────────
version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db/${DB_NAME}_airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  depends_on:
    db:
      condition: service_healthy
  networks:
    - xyz_net

services:

  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "3000:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xyz_net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "3001:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - xyz_net

  # ── Django ───────────────────────────────────────────────
  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: runtime
      args:
        REQUIREMENTS: development
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "3002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - xyz_net

  # ── Celery Worker ────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: runtime
      args:
        REQUIREMENTS: development
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - .:/app
    command: celery -A config worker --loglevel=info --concurrency=4
    depends_on:
      - django
      - redis
    networks:
      - xyz_net

  # ── Celery Beat (Scheduler) ───────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      target: runtime
      args:
        REQUIREMENTS: development
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - .:/app
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - django
      - redis
    networks:
      - xyz_net

  # ── Airflow DB Init ──────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create --role Admin --username ${AIRFLOW_API_USER} --password ${AIRFLOW_API_PASSWORD} --firstname XYZ --lastname Admin --email admin@xyz.internal || true"
    restart: on-failure

  # ── Airflow Webserver ────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    restart: unless-stopped
    command: airflow webserver
    ports:
      - "3003:8080"
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Airflow Scheduler ────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    command: airflow scheduler
    depends_on:
      - airflow-init

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  airflow_logs:

networks:
  xyz_net:
    driver: bridge
